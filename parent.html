<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Parent Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --surface: #16161f;
      --surface2: #1e1e2a;
      --surface3: #282836;
      --accent: #8b5cf6;
      --success: #22c55e;
      --warning: #f59e0b;
      --error: #ef4444;
      --text: #ffffff;
      --muted: #71717a;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 2rem;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.5rem;
      background: var(--surface);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .nav-back {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--surface2);
      border: none;
      color: var(--text);
      font-size: 1.3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .nav-back:hover { background: var(--accent); }

    .header h1 {
      font-size: 1.2rem;
      font-weight: 600;
    }

    .sync-badge {
      margin-left: auto;
      padding: 0.3rem 0.6rem;
      background: var(--surface2);
      border-radius: 12px;
      font-size: 0.7rem;
      color: var(--muted);
    }

    .sync-badge.synced { color: var(--success); }

    /* Subject Tabs */
    .subject-tabs {
      display: flex;
      background: var(--surface);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .subject-tab {
      flex: 1;
      min-width: 80px;
      padding: 1rem 0.5rem;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
      position: relative;
      transition: all 0.2s;
    }

    .subject-tab:hover { color: var(--text); }

    .subject-tab.active {
      color: var(--text);
    }

    .subject-tab.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 20%;
      right: 20%;
      height: 3px;
      background: var(--tab-color, var(--accent));
      border-radius: 3px 3px 0 0;
    }

    .subject-tab .icon { font-size: 1.4rem; }
    .subject-tab .count {
      font-size: 0.65rem;
      opacity: 0.6;
    }

    /* Format Filter */
    .format-filter {
      display: flex;
      gap: 0.5rem;
      padding: 1rem 1.5rem;
      background: var(--surface);
      overflow-x: auto;
    }

    .format-chip {
      padding: 0.5rem 1rem;
      border-radius: 20px;
      background: var(--surface2);
      border: 2px solid transparent;
      color: var(--muted);
      font-size: 0.8rem;
      cursor: pointer;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: all 0.2s;
    }

    .format-chip:hover {
      color: var(--text);
      border-color: var(--surface3);
    }

    .format-chip.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    /* Content Area */
    .content-area {
      padding: 1rem 1.5rem;
    }

    .content-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .content-title {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .content-count {
      font-size: 0.75rem;
      color: var(--muted);
    }

    /* Content Grid */
    .content-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }

    /* Content Card */
    .content-card {
      background: var(--surface);
      border-radius: 16px;
      overflow: hidden;
      transition: all 0.2s;
    }

    .content-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }

    .card-main {
      padding: 1rem;
      cursor: pointer;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      gap: 0.8rem;
      margin-bottom: 0.8rem;
    }

    .card-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      flex-shrink: 0;
    }

    .card-info { flex: 1; }

    .card-name {
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 0.2rem;
    }

    .card-meta {
      font-size: 0.75rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .card-format {
      padding: 0.15rem 0.4rem;
      background: var(--surface3);
      border-radius: 4px;
      font-size: 0.65rem;
      text-transform: uppercase;
    }

    .preview-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--surface2);
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .preview-btn:hover {
      background: var(--accent);
      color: white;
    }

    /* Assignment Row - Child Avatars */
    .assignment-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.8rem 1rem;
      background: var(--surface2);
      border-top: 1px solid rgba(255,255,255,0.03);
    }

    .assignment-label {
      font-size: 0.7rem;
      color: var(--muted);
      margin-right: auto;
    }

    .child-toggle {
      position: relative;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2px solid var(--surface3);
      cursor: pointer;
      overflow: hidden;
      transition: all 0.2s;
      background: var(--surface);
    }

    .child-toggle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: all 0.2s;
    }

    .child-toggle:hover {
      border-color: var(--accent);
      transform: scale(1.1);
    }

    /* Not assigned - dim */
    .child-toggle.none {
      opacity: 0.4;
      filter: grayscale(100%);
    }

    .child-toggle.none:hover {
      opacity: 0.8;
      filter: grayscale(50%);
    }

    /* Assigned - accent border */
    .child-toggle.assigned {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.3);
    }

    /* Completed - green with check */
    .child-toggle.completed {
      border-color: var(--success);
      opacity: 0.6;
    }

    .child-toggle.completed::after {
      content: '✓';
      position: absolute;
      bottom: -2px;
      right: -2px;
      width: 16px;
      height: 16px;
      background: var(--success);
      border-radius: 50%;
      font-size: 0.6rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    /* Tooltip */
    .child-toggle[title] {
      position: relative;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
    }

    .empty-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }
    .empty-text { font-size: 1rem; }

    /* Quick Stats Bar */
    .stats-bar {
      display: flex;
      gap: 1rem;
      padding: 1rem 1.5rem;
      background: var(--surface);
      margin-bottom: 1rem;
      overflow-x: auto;
    }

    .stat-card {
      flex: 1;
      min-width: 120px;
      background: var(--surface2);
      border-radius: 12px;
      padding: 0.8rem 1rem;
      text-align: center;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
    }

    .stat-label {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--success);
      color: white;
      padding: 0.8rem 1.5rem;
      border-radius: 10px;
      font-weight: 500;
      font-size: 0.9rem;
      opacity: 0;
      transition: all 0.3s;
      z-index: 1000;
    }

    .toast.visible {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* Legend */
    .legend {
      display: flex;
      gap: 1.5rem;
      padding: 0.8rem 1.5rem;
      font-size: 0.75rem;
      color: var(--muted);
      background: var(--surface);
      border-top: 1px solid rgba(255,255,255,0.03);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .legend-dot.none { background: var(--surface3); opacity: 0.5; }
    .legend-dot.assigned { background: var(--accent); }
    .legend-dot.completed { background: var(--success); }

    /* Responsive */
    @media (max-width: 600px) {
      .content-grid {
        grid-template-columns: 1fr;
      }
      .stats-bar {
        flex-wrap: nowrap;
      }
      .stat-card {
        min-width: 100px;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <button class="nav-back" onclick="goBack()">←</button>
    <h1>Parent Dashboard</h1>
    <span class="sync-badge" id="syncBadge">Local</span>
  </header>

  <div class="stats-bar" id="statsBar"></div>

  <nav class="subject-tabs" id="subjectTabs"></nav>

  <div class="format-filter" id="formatFilter"></div>

  <div class="legend">
    <div class="legend-item"><span class="legend-dot none"></span> Not assigned</div>
    <div class="legend-item"><span class="legend-dot assigned"></span> Assigned</div>
    <div class="legend-item"><span class="legend-dot completed"></span> Completed</div>
  </div>

  <div class="content-area">
    <div class="content-header">
      <span class="content-title" id="contentTitle">All Content</span>
      <span class="content-count" id="contentCount"></span>
    </div>
    <div class="content-grid" id="contentGrid"></div>
  </div>

  <div class="toast" id="toast">Saved!</div>

  <script type="module" src="js/firebase-config.js"></script>
  <script src="js/storage.js"></script>
  <script>
    let catalog = null;
    let allContent = [];
    let currentSubject = 'all';
    let currentFormat = 'all';

    async function init() {
      // Firebase sync
      setTimeout(async () => {
        if (window.MokshFirebase) {
          const synced = await Moksh.enableCloudSync();
          if (synced) {
            document.getElementById('syncBadge').textContent = '☁️ Synced';
            document.getElementById('syncBadge').classList.add('synced');
            renderAll();
            Moksh.onSyncUpdate(() => {
              renderAll();
              showToast('Updated from another device');
            });
          }
        }
      }, 500);

      try {
        const [catalogRes, contentRes] = await Promise.all([
          fetch('data/catalog.json'),
          fetch('data/content.json')
        ]);
        catalog = await catalogRes.json();
        allContent = (await contentRes.json()).content;

        renderAll();
      } catch (error) {
        console.error('Error:', error);
      }
    }

    function renderAll() {
      renderStats();
      renderSubjectTabs();
      renderFormatFilter();
      renderContentGrid();
    }

    function renderStats() {
      const students = Object.values(catalog.students);
      let totalAssigned = 0;
      let totalCompleted = 0;

      students.forEach(student => {
        const assignments = Moksh.getAssignments(student.id);
        totalAssigned += assignments.length;
        assignments.forEach(contentId => {
          const stats = Moksh.getActivityStats(student.id, contentId);
          if (stats && stats.attempts > 0) totalCompleted++;
        });
      });

      document.getElementById('statsBar').innerHTML = `
        <div class="stat-card">
          <div class="stat-value">${allContent.length}</div>
          <div class="stat-label">Total Activities</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${totalAssigned}</div>
          <div class="stat-label">Assignments</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${totalCompleted}</div>
          <div class="stat-label">Completed</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${students.length}</div>
          <div class="stat-label">Kids</div>
        </div>
      `;
    }

    function renderSubjectTabs() {
      const subjects = Object.values(catalog.subjects).sort((a, b) => a.order - b.order);
      const container = document.getElementById('subjectTabs');

      // Count content per subject
      const counts = { all: allContent.length };
      allContent.forEach(c => {
        counts[c.subject] = (counts[c.subject] || 0) + 1;
      });

      let html = `
        <button class="subject-tab ${currentSubject === 'all' ? 'active' : ''}"
                onclick="selectSubject('all')"
                style="--tab-color: var(--accent)">
          <span class="icon">📚</span>
          <span>All</span>
          <span class="count">${counts.all}</span>
        </button>
      `;

      subjects.forEach(subject => {
        html += `
          <button class="subject-tab ${currentSubject === subject.id ? 'active' : ''}"
                  onclick="selectSubject('${subject.id}')"
                  style="--tab-color: ${subject.color}">
            <span class="icon">${subject.icon}</span>
            <span>${subject.name}</span>
            <span class="count">${counts[subject.id] || 0}</span>
          </button>
        `;
      });

      container.innerHTML = html;
    }

    function renderFormatFilter() {
      const formats = Object.values(catalog.formats);
      const container = document.getElementById('formatFilter');

      // Get formats available in current subject
      const availableFormats = new Set();
      getFilteredContent(currentSubject, 'all').forEach(c => availableFormats.add(c.format));

      let html = `
        <button class="format-chip ${currentFormat === 'all' ? 'active' : ''}"
                onclick="selectFormat('all')">
          All Types
        </button>
      `;

      formats.forEach(format => {
        if (currentSubject !== 'all' && !availableFormats.has(format.id)) return;
        html += `
          <button class="format-chip ${currentFormat === format.id ? 'active' : ''}"
                  onclick="selectFormat('${format.id}')">
            ${format.icon} ${format.name}
          </button>
        `;
      });

      container.innerHTML = html;
    }

    function getFilteredContent(subject, format) {
      return allContent.filter(c => {
        if (subject !== 'all' && c.subject !== subject) return false;
        if (format !== 'all' && c.format !== format) return false;
        return true;
      });
    }

    function renderContentGrid() {
      const filtered = getFilteredContent(currentSubject, currentFormat);
      const container = document.getElementById('contentGrid');
      const students = Object.values(catalog.students).sort((a, b) => a.order - b.order);

      // Update header
      const subjectName = currentSubject === 'all' ? 'All Subjects' : catalog.subjects[currentSubject].name;
      const formatName = currentFormat === 'all' ? '' : ` / ${catalog.formats[currentFormat].name}`;
      document.getElementById('contentTitle').textContent = subjectName + formatName;
      document.getElementById('contentCount').textContent = `${filtered.length} items`;

      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📭</div>
            <div class="empty-text">No content in this category</div>
          </div>
        `;
        return;
      }

      container.innerHTML = filtered.map(content => {
        const subject = catalog.subjects[content.subject];
        const topic = catalog.topics[content.topic];

        return `
          <div class="content-card">
            <div class="card-main">
              <div class="card-top">
                <div class="card-icon" style="background: ${subject.color}20; color: ${subject.color}">
                  ${content.icon || subject.icon}
                </div>
                <div class="card-info">
                  <div class="card-name">${content.name}</div>
                  <div class="card-meta">
                    <span class="card-format">${content.format}</span>
                    <span>${topic?.name || subject.name}</span>
                    <span>• ${content.items?.length || content.pages?.length || content.paragraphs?.length || 0} items</span>
                  </div>
                </div>
                <button class="preview-btn" onclick="previewContent('${content.id}')" title="Preview">▶</button>
              </div>
            </div>
            <div class="assignment-row">
              <span class="assignment-label">Assign to:</span>
              ${students.map(student => {
                const status = getAssignmentStatus(student.id, content.id);
                return `
                  <div class="child-toggle ${status}"
                       onclick="toggleAssignment('${student.id}', '${content.id}')"
                       title="${student.name}: ${status}">
                    <img src="${student.avatar}" alt="${student.name}">
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        `;
      }).join('');
    }

    function getAssignmentStatus(studentId, contentId) {
      const assignments = Moksh.getAssignments(studentId);
      if (!assignments.includes(contentId)) return 'none';

      const stats = Moksh.getActivityStats(studentId, contentId);
      if (stats && stats.attempts > 0) return 'completed';

      return 'assigned';
    }

    function toggleAssignment(studentId, contentId) {
      const status = getAssignmentStatus(studentId, contentId);

      if (status === 'none') {
        // Assign
        Moksh.assignActivity(studentId, contentId);
        showToast(`Assigned to ${catalog.students[studentId].name}`);
      } else if (status === 'assigned') {
        // Unassign
        Moksh.unassignActivity(studentId, contentId);
        showToast(`Removed from ${catalog.students[studentId].name}`);
      } else {
        // Completed - ask before reassigning
        if (confirm(`${catalog.students[studentId].name} completed this. Remove assignment?`)) {
          Moksh.unassignActivity(studentId, contentId);
          showToast('Removed');
        }
      }

      renderAll();
    }

    function selectSubject(subjectId) {
      currentSubject = subjectId;
      currentFormat = 'all'; // Reset format when changing subject
      renderAll();
    }

    function selectFormat(formatId) {
      currentFormat = formatId;
      renderContentGrid();
      renderFormatFilter();
    }

    function previewContent(contentId) {
      const content = allContent.find(c => c.id === contentId);
      if (!content) return;

      let url = '';
      if (content.format === 'flashcard') {
        url = `learn/flashcard.html?id=${contentId}`;
      } else if (content.format === 'story' || content.format === 'story-qa') {
        url = `learn/story.html?id=${contentId}`;
      }
      if (url) window.open(url, '_blank');
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('visible');
      setTimeout(() => toast.classList.remove('visible'), 2000);
    }

    function goBack() {
      window.location.href = 'index.html';
    }

    init();
  </script>
</body>
</html>
