<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Story Time</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --surface: #16161f;
      --accent: #6366f1;
      --success: #22c55e;
      --text: #ffffff;
      --muted: #71717a;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.5rem;
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .close-btn {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: rgba(255,255,255,0.1);
      border: none;
      color: var(--text);
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .close-btn:hover {
      background: var(--accent);
    }

    .header-title {
      font-size: 1.2rem;
      font-weight: 600;
    }

    .header-icon {
      font-size: 1.5rem;
    }

    /* Story Container */
    .story-container {
      flex: 1;
      padding: 2rem;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
    }

    .story-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .story-emoji {
      font-size: 4rem;
      margin-bottom: 1rem;
    }

    .story-title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .story-subtitle {
      color: var(--muted);
      font-size: 1.1rem;
    }

    /* Phonics Section */
    .phonics-section {
      background: var(--surface);
      border-radius: 20px;
      padding: 2rem;
      margin-bottom: 2rem;
    }

    .phonics-title {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .word-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 1rem;
    }

    .word-card {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 1rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      border: 2px solid transparent;
    }

    .word-card:hover {
      background: rgba(255,255,255,0.1);
      border-color: var(--accent);
    }

    .word-card.spoken {
      border-color: var(--success);
      background: rgba(34, 197, 94, 0.1);
    }

    .word-text {
      font-size: 1.3rem;
      font-weight: 600;
      margin-bottom: 0.3rem;
    }

    .word-highlight {
      color: var(--accent);
    }

    .word-hint {
      font-size: 0.8rem;
      color: var(--muted);
    }

    /* Story Content */
    .story-content {
      background: var(--surface);
      border-radius: 20px;
      padding: 2rem;
      line-height: 1.8;
      font-size: 1.2rem;
    }

    .story-content p {
      margin-bottom: 1.5rem;
    }

    .story-content p:last-child {
      margin-bottom: 0;
    }

    /* Audio Button */
    .speak-btn {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: white;
      font-size: 1.5rem;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .speak-btn:hover {
      transform: scale(1.1);
    }

    .speak-btn:active {
      transform: scale(0.95);
    }

    /* Progress indicator */
    .progress-bar {
      height: 4px;
      background: rgba(255,255,255,0.1);
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 200;
    }

    .progress-fill {
      height: 100%;
      background: var(--success);
      width: 0%;
      transition: width 0.3s;
    }

    /* Complete overlay */
    .complete-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 300;
    }

    .complete-overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .complete-emoji {
      font-size: 5rem;
      margin-bottom: 1rem;
    }

    .complete-text {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 2rem;
    }

    .complete-btn {
      padding: 1rem 2rem;
      border-radius: 12px;
      background: var(--accent);
      border: none;
      color: white;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
    }

    .finish-btn {
      display: block;
      width: 100%;
      max-width: 300px;
      margin: 2rem auto;
      padding: 1rem 2rem;
      border-radius: 50px;
      background: linear-gradient(135deg, var(--success), #16a34a);
      border: none;
      color: white;
      font-size: 1.2rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(34, 197, 94, 0.4);
      transition: all 0.3s;
    }

    .finish-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(34, 197, 94, 0.5);
    }

    .finish-btn:active {
      transform: translateY(0);
    }

    @media (max-width: 600px) {
      .story-container { padding: 1rem; }
      .story-title { font-size: 1.5rem; }
      .word-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>

          "एक बार शिव जी के पास मीठा फल था। दोनों बेटे — गणेश और कार्तिकेय — उसे चाहते थे।",
          "शिव जी बोले, \"जो पहले दुनिया का चक्कर लगाकर आएगा, फल उसी का।\"",
          "कार्तिकेय झट मोर पर बैठे और उड़ चले — पहाड़, नदी, जंगल पार करते गए।",
          "गणेश जी ने नन्हे चूहे को देखा। सोचा, मुस्कुराए। फिर माँ-बाप के चारों ओर तीन चक्कर लगाए और बोले, \"माँ-पिता ही मेरी पूरी दुनिया हैं।\"",
          "शिव जी हँसे, पार्वती जी की आँखें भर आईं। फल गणेश जी को मिला।",
          "थोड़ी देर बाद कार्तिकेय थके-हारे लौटे — देखा तो भैया आराम से फल खा रहे थे!",
          "तभी से हर शुभ काम में सबसे पहले गणेश जी को याद किया जाता है।"
        ]
      },
      krishna: {
        type: 'hindi-story',
        title: 'कृष्ण जी और माखन',
        icon: '🙏',
        subtitle: 'Krishna and Butter',
        graphic: '🧈',
        paragraphs: [
          "नन्हे कृष्ण जी बहुत शरारती थे। उन्हें माखन बहुत पसंद था।",
          "माँ यशोदा माखन को ऊँचे मटके में छुपा देती थीं। पर कृष्ण जी चुप कहाँ बैठते!",
          "उन्होंने अपने दोस्तों को बुलाया। सब मिलकर एक के ऊपर एक चढ़े। कृष्ण जी सबसे ऊपर पहुँचे और मटका फोड़ दिया।",
          "माखन गिरा, सब हँसे, कृष्ण जी ने मुँह भर के खाया।",
          "तभी माँ आ गईं! कृष्ण जी ने मीठी मुस्कान दी। माँ का गुस्सा पल में पिघल गया।",
          "आज भी जन्माष्टमी पर बच्चे यही \"दही-हांडी\" खेल खेलते हैं।"
        ]
      },
      durga: {
        type: 'hindi-story',
        title: 'दुर्गा माँ और महिषासुर',
        icon: '🙏',
        subtitle: 'Durga Maa and Mahishasur',
        graphic: '🦁',
        paragraphs: [
          "बहुत समय पहले महिषासुर नाम का राक्षस था। उसे वरदान मिला था — कोई मर्द उसे हरा नहीं सकता। घमंड में आकर उसने स्वर्ग पर कब्ज़ा कर लिया।",
          "सब देवता डरकर भागे। तब सबने मिलकर अपनी-अपनी शक्ति जोड़ी और एक तेज़ रोशनी से दुर्गा माँ प्रकट हुईं। दस हाथ, हर हाथ में एक हथियार, और शेर उनकी सवारी!",
          "माँ शेर पर बैठकर युद्ध के मैदान में पहुँचीं। नौ दिन और नौ रातों तक भयंकर लड़ाई चली। दसवें दिन माँ ने त्रिशूल से महिषासुर का अंत कर दिया।",
          "स्वर्ग में फिर से खुशी लौट आई। तभी से हर साल नवरात्रि के नौ दिन माँ की पूजा होती है, और दसवें दिन — दशहरा — बुराई पर अच्छाई की जीत मनाई जाती है।"
        ]
      }
    };

    function init() {
      const data = content[storyId];
      if (!data) {
        document.getElementById('storyContainer').innerHTML = '<p>Story not found</p>';
        return;
      }

      document.getElementById('headerTitle').textContent = data.title;
      document.getElementById('headerIcon').textContent = data.icon;

      if (data.type === 'phonics') {
        renderPhonics(data);
      } else if (data.type === 'phonics-story') {
        renderPhonicsStory(data);
      } else if (data.type === 'hindi-story') {
        renderHindiStory(data);
      } else {
        renderStory(data);
      }

      // Start tracking
      Moksh.startSession(userId, `phonics-${storyId}`);
    }

    function renderPhonics(data) {
      const container = document.getElementById('storyContainer');
      totalWords = data.words.length;

      container.innerHTML = `
        <div class="story-header">
          <div class="story-emoji">${data.icon}</div>
          <h1 class="story-title">${data.title}</h1>
          <p class="story-subtitle">${data.subtitle}</p>
        </div>
        <div class="phonics-section">
          <h2 class="phonics-title">Tap each word to hear it!</h2>
          <div class="word-grid" id="wordGrid">
            ${data.words.map((w, i) => `
              <div class="word-card" data-index="${i}" onclick="speakWord(${i})">
                <div class="word-text">${highlightWord(w.word, w.highlight)}</div>
                <div class="word-hint">${w.hint}</div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    function renderPhonicsStory(data) {
      const container = document.getElementById('storyContainer');
      totalWords = data.pages.length;

      container.innerHTML = `
        <div class="story-header">
          <div class="story-emoji">${data.icon}</div>
          <h1 class="story-title">${data.title}</h1>
          <p class="story-subtitle">${data.subtitle}</p>
        </div>
        <div class="phonics-story-pages">
          ${data.pages.map((page, i) => `
            <div class="phonics-page" data-index="${i}" onclick="markPageRead(${i})">
              <p class="page-text">${page.text}</p>
              <span class="page-emoji">${page.emoji}</span>
            </div>
          `).join('')}
        </div>
        <p class="the-end">The End ✨</p>
      `;

      // Add styles for phonics story pages
      const style = document.createElement('style');
      style.textContent = `
        .phonics-story-pages {
          display: flex;
          flex-direction: column;
          gap: 1rem;
        }
        .phonics-page {
          background: var(--surface);
          border-radius: 16px;
          padding: 1.5rem;
          border-left: 5px solid var(--accent);
          cursor: pointer;
          transition: all 0.2s;
        }
        .phonics-page:hover {
          transform: translateX(4px);
          border-left-color: var(--success);
        }
        .phonics-page.read {
          border-left-color: var(--success);
          background: rgba(34, 197, 94, 0.1);
        }
        .page-text {
          font-size: 1.4rem;
          line-height: 1.8;
          margin-bottom: 0.5rem;
        }
        .page-text b {
          color: var(--accent);
          font-weight: 700;
        }
        .page-emoji {
          font-size: 2rem;
          display: block;
          text-align: center;
          margin-top: 0.5rem;
        }
        .the-end {
          text-align: center;
          font-size: 1.5rem;
          color: var(--accent);
          margin-top: 2rem;
          font-style: italic;
        }
      `;
      document.head.appendChild(style);
    }

    function markPageRead(index) {
      const data = content[storyId];
      const page = document.querySelector(`.phonics-page[data-index="${index}"]`);

      if (!page.classList.contains('read')) {
        page.classList.add('read');
        wordsSpoken++;
        Moksh.recordAnswer(userId, `phonics-${storyId}`, true);
        updateProgress();

        // Speak the page text (strip HTML)
        const text = data.pages[index].text.replace(/<[^>]*>/g, '');
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 0.85;
        speechSynth.speak(utterance);
      }

      // Check completion
      if (wordsSpoken === totalWords) {
        setTimeout(showComplete, 1000);
      }
    }

    function highlightWord(word, highlight) {
      const idx = word.toLowerCase().indexOf(highlight.toLowerCase());
      if (idx === -1) return word;
      return word.slice(0, idx) +
             `<span class="word-highlight">${word.slice(idx, idx + highlight.length)}</span>` +
             word.slice(idx + highlight.length);
    }

    function speakWord(index) {
      const data = content[storyId];
      const word = data.words[index];

      // Mark as spoken
      const card = document.querySelector(`[data-index="${index}"]`);
      if (!card.classList.contains('spoken')) {
        card.classList.add('spoken');
        wordsSpoken++;
        Moksh.recordAnswer(userId, `phonics-${storyId}`, true);
        updateProgress();
      }

      // Speak the word
      const utterance = new SpeechSynthesisUtterance(word.word);
      utterance.rate = 0.8;
      speechSynth.speak(utterance);

      // Check completion
      if (wordsSpoken === totalWords) {
        setTimeout(showComplete, 500);
      }
    }

    function renderStory(data) {
      const container = document.getElementById('storyContainer');
      totalWords = data.paragraphs.length;

      container.innerHTML = `
        <div class="story-header">
          <div class="story-emoji">${data.icon}</div>
          <h1 class="story-title">${data.title}</h1>
          <p class="story-subtitle">${data.subtitle}</p>
        </div>
        <div class="story-content">
          ${data.paragraphs.map(p => `<p>${p}</p>`).join('')}
        </div>
        <button class="finish-btn" onclick="finishReading()">I Finished Reading!</button>
      `;
    }

    function finishReading() {
      wordsSpoken = totalWords;
      Moksh.recordAnswer(userId, `story-${storyId}`, true);
      updateProgress();
      showComplete();
    }

    function renderHindiStory(data) {
      const container = document.getElementById('storyContainer');
      totalWords = data.paragraphs.length;

      container.innerHTML = `
        <div class="hindi-story">
          <div class="hindi-header">
            <div class="hindi-graphic">${data.graphic}</div>
            <h1 class="hindi-title">${data.title}</h1>
            <p class="hindi-subtitle">${data.subtitle}</p>
          </div>
          <div class="hindi-content">
            ${data.paragraphs.map((p, i) => `
              <div class="hindi-para" style="animation-delay: ${i * 0.1}s">
                <span class="hindi-bullet">॥</span>
                <p>${p}</p>
              </div>
            `).join('')}
          </div>
          <div class="hindi-footer">
            <span>॥ इति कथा समाप्त ॥</span>
          </div>
          <button class="finish-btn" onclick="finishReading()">मैंने पढ़ लिया!</button>
        </div>
      `;

      // Add Hindi styles
      const style = document.createElement('style');
      style.textContent = `
        @import url('https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Hindi:ital@0;1&display=swap');

        .hindi-story {
          max-width: 700px;
          margin: 0 auto;
        }

        .hindi-header {
          text-align: center;
          margin-bottom: 2.5rem;
          padding: 2rem;
          background: linear-gradient(135deg, rgba(255,153,51,0.15), rgba(255,255,255,0.05));
          border-radius: 20px;
          border: 2px solid rgba(255,153,51,0.3);
        }

        .hindi-graphic {
          font-size: 5rem;
          margin-bottom: 1rem;
          filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }

        .hindi-title {
          font-family: 'Tiro Devanagari Hindi', serif;
          font-size: 2.5rem;
          font-weight: 400;
          color: #ff9933;
          margin-bottom: 0.5rem;
          text-shadow: 0 2px 10px rgba(255,153,51,0.3);
        }

        .hindi-subtitle {
          color: var(--muted);
          font-size: 1rem;
          font-style: italic;
        }

        .hindi-content {
          display: flex;
          flex-direction: column;
          gap: 1.5rem;
        }

        .hindi-para {
          display: flex;
          gap: 1rem;
          align-items: flex-start;
          padding: 1.5rem;
          background: var(--surface);
          border-radius: 16px;
          border-left: 4px solid #ff9933;
          animation: fadeInUp 0.5s ease both;
        }

        @keyframes fadeInUp {
          from {
            opacity: 0;
            transform: translateY(20px);
          }
          to {
            opacity: 1;
            transform: translateY(0);
          }
        }

        .hindi-bullet {
          color: #ff9933;
          font-size: 1.5rem;
          font-family: 'Tiro Devanagari Hindi', serif;
          flex-shrink: 0;
          margin-top: 0.2rem;
        }

        .hindi-para p {
          font-family: 'Tiro Devanagari Hindi', serif;
          font-size: 1.4rem;
          line-height: 2.2;
          color: #fff;
          margin: 0;
          letter-spacing: 0.02em;
        }

        .hindi-footer {
          text-align: center;
          margin-top: 2.5rem;
          padding: 1.5rem;
          font-family: 'Tiro Devanagari Hindi', serif;
          font-size: 1.3rem;
          color: #ff9933;
          border-top: 1px solid rgba(255,153,51,0.3);
          border-bottom: 1px solid rgba(255,153,51,0.3);
        }

        @media (max-width: 600px) {
          .hindi-title { font-size: 1.8rem; }
          .hindi-para p { font-size: 1.2rem; line-height: 2; }
          .hindi-graphic { font-size: 4rem; }
        }
      `;
      document.head.appendChild(style);

    }

    function updateProgress() {
      const pct = totalWords > 0 ? (wordsSpoken / totalWords) * 100 : 0;
      document.getElementById('progressFill').style.width = `${pct}%`;
    }

    function speakContent() {
      const data = content[storyId];
      let text = '';
      if (data.type === 'story') {
        text = data.paragraphs.join(' ');
      } else if (data.type === 'phonics-story') {
        text = data.pages.map(p => p.text.replace(/<[^>]*>/g, '')).join(' ');
      }
      if (text) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 0.85;
        speechSynth.speak(utterance);
      }
    }

    function showComplete() {
      Moksh.endSession(userId, `phonics-${storyId}`);
      document.getElementById('completeOverlay').classList.add('visible');
      launchConfetti();
    }

    function launchConfetti() {
      const canvas = document.getElementById('confetti');
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const pieces = [];
      const colors = ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff', '#5f27cd', '#00d2d3', '#1dd1a1'];

      for (let i = 0; i < 150; i++) {
        pieces.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height - canvas.height,
          r: Math.random() * 6 + 4,
          d: Math.random() * 150,
          color: colors[Math.floor(Math.random() * colors.length)],
          tilt: Math.random() * 10 - 5,
          tiltAngle: Math.random() * Math.PI,
          tiltSpeed: Math.random() * 0.1 + 0.05
        });
      }

      let frame = 0;
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        pieces.forEach(p => {
          ctx.beginPath();
          ctx.fillStyle = p.color;
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(p.tiltAngle);
          ctx.fillRect(-p.r / 2, -p.r / 2, p.r, p.r * 0.6);
          ctx.restore();

          p.y += 3 + Math.random() * 2;
          p.x += Math.sin(p.d) * 0.5;
          p.tiltAngle += p.tiltSpeed;

          if (p.y > canvas.height) {
            p.y = -10;
            p.x = Math.random() * canvas.width;
          }
        });

        frame++;
        if (frame < 180) {
          requestAnimationFrame(draw);
        } else {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
      }
      draw();
    }

    function goBack() {
      // Save any incomplete session
      if (wordsSpoken > 0 && wordsSpoken < totalWords) {
        Moksh.endSession(userId, `phonics-${storyId}`);
      }
      // Navigate to dashboard (history.back may not work if direct link)
      window.location.href = 'index.html';
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') goBack();
    });

    init();
  </script>
</body>
</html>
