<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Flashcards</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --surface: #16161f;
      --surface2: #1e1e2a;
      --accent: #6366f1;
      --success: #22c55e;
      --error: #ef4444;
      --text: #ffffff;
      --muted: #71717a;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    /* Compact Header */
    .header {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.6rem 1rem;
      background: var(--surface);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      flex-shrink: 0;
    }

    .header-icon {
      font-size: 1.5rem;
    }

    .header-info {
      flex: 1;
      min-width: 0;
    }

    .header-title {
      font-size: 0.95rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .header-subtitle {
      font-size: 0.7rem;
      color: var(--muted);
    }

    .header-progress {
      text-align: right;
    }

    .header-count {
      font-size: 0.9rem;
      font-weight: 600;
    }

    .header-accuracy {
      font-size: 0.7rem;
      color: var(--muted);
    }

    /* Progress Bar */
    .progress-bar {
      height: 4px;
      background: var(--surface2);
      flex-shrink: 0;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--success));
      transition: width 0.3s ease;
      width: 0%;
    }

    /* Main Play Area */
    .play-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      gap: 1rem;
      overflow: hidden;
    }

    /* Flashcard */
    .flashcard-wrapper {
      perspective: 1000px;
      width: 100%;
      max-width: 360px;
      flex-shrink: 1;
      min-height: 0;
    }

    .flashcard {
      width: 100%;
      aspect-ratio: 4/3;
      max-height: 240px;
      cursor: pointer;
      transform-style: preserve-3d;
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }

    .flashcard.flipped {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    .card-front {
      background: linear-gradient(145deg, var(--surface), var(--surface2));
      border: 2px solid rgba(255,255,255,0.1);
    }

    .card-back {
      background: linear-gradient(145deg, var(--accent), #4f46e5);
      transform: rotateY(180deg);
    }

    .card-content {
      font-size: clamp(1.8rem, 8vw, 2.5rem);
      font-weight: 700;
      line-height: 1.2;
    }

    .card-hint {
      margin-top: 0.5rem;
      font-size: 0.8rem;
      color: var(--muted);
      opacity: 0.8;
    }

    .card-back .card-hint {
      color: rgba(255,255,255,0.8);
    }

    .tap-hint {
      position: absolute;
      bottom: 1rem;
      font-size: 0.7rem;
      color: var(--muted);
      opacity: 0.5;
    }

    /* Transport Controls */
    .transport {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 0.5rem;
      flex-shrink: 0;
    }

    .transport-btn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: none;
      font-size: 1.6rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .transport-btn:active {
      transform: scale(0.9);
    }

    .transport-btn.back {
      background: var(--surface2);
      color: var(--muted);
      width: 48px;
      height: 48px;
      font-size: 1.3rem;
    }

    .transport-btn.back:hover {
      background: var(--surface);
      color: var(--text);
    }

    .transport-btn.wrong {
      background: rgba(239, 68, 68, 0.15);
      color: var(--error);
      opacity: 0.3;
      pointer-events: none;
    }

    .transport-btn.wrong.active {
      opacity: 1;
      pointer-events: auto;
    }

    .transport-btn.wrong.active:hover,
    .transport-btn.wrong.active:active {
      background: var(--error);
      color: white;
      box-shadow: 0 6px 24px rgba(239, 68, 68, 0.4);
    }

    .transport-btn.correct {
      background: rgba(34, 197, 94, 0.15);
      color: var(--success);
      opacity: 0.3;
      pointer-events: none;
    }

    .transport-btn.correct.active {
      opacity: 1;
      pointer-events: auto;
    }

    .transport-btn.correct.active:hover,
    .transport-btn.correct.active:active {
      background: var(--success);
      color: white;
      box-shadow: 0 6px 24px rgba(34, 197, 94, 0.4);
    }

    /* Celebration Overlay */
    .complete-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      padding: 2rem;
    }

    .complete-overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .complete-icon {
      font-size: 4rem;
      animation: bounce 0.6s ease;
    }

    @keyframes bounce {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    .complete-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0.8rem 0;
    }

    .complete-stats {
      display: flex;
      gap: 2rem;
      margin: 1rem 0;
    }

    .complete-stat {
      text-align: center;
    }

    .complete-stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--success);
    }

    .complete-stat-label {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .complete-btn {
      margin-top: 1.5rem;
      padding: 0.8rem 2.5rem;
      border-radius: 50px;
      background: var(--accent);
      border: none;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .complete-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 30px rgba(99, 102, 241, 0.4);
    }

    /* Confetti Canvas */
    #confetti {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 200;
    }

    /* Landscape mode */
    @media (orientation: landscape) and (max-height: 500px) {
      .header { padding: 0.4rem 1rem; }
      .header-title { font-size: 0.85rem; }
      .header-icon { font-size: 1.2rem; }
      .play-area { padding: 0.5rem; gap: 0.5rem; flex-direction: row; }
      .flashcard-wrapper { max-width: 320px; }
      .flashcard { max-height: 180px; }
      .transport { flex-direction: column; gap: 0.8rem; }
      .transport-btn { width: 50px; height: 50px; font-size: 1.3rem; }
      .transport-btn.back { width: 40px; height: 40px; font-size: 1rem; }
    }

    /* Small phones */
    @media (max-height: 600px) and (orientation: portrait) {
      .flashcard { max-height: 200px; }
      .card-content { font-size: 1.8rem; }
      .transport-btn { width: 54px; height: 54px; font-size: 1.4rem; }
    }

    /* Very small screens */
    @media (max-height: 500px) and (orientation: portrait) {
      .header { padding: 0.4rem 0.8rem; }
      .header-title { font-size: 0.85rem; }
      .flashcard { max-height: 160px; }
      .transport-btn { width: 48px; height: 48px; font-size: 1.2rem; }
      .transport-btn.back { width: 36px; height: 36px; }
    }
  </style>
</head>
<body>
  <header class="header">
    <span class="header-icon" id="headerIcon">⚡</span>
    <div class="header-info">
      <div class="header-title" id="headerTitle">Loading...</div>
      <div class="header-subtitle" id="headerSubtitle">Flashcards</div>
    </div>
    <div class="header-progress">
      <div class="header-count" id="progressCount">1 / 10</div>
      <div class="header-accuracy" id="progressAccuracy">0% correct</div>
    </div>
  </header>

  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <main class="play-area">
    <div class="flashcard-wrapper">
      <div class="flashcard" id="flashcard" onclick="flipCard()">
        <div class="card-face card-front">
          <div class="card-content" id="cardFront">Loading...</div>
          <div class="tap-hint">Tap to flip</div>
        </div>
        <div class="card-face card-back">
          <div class="card-content" id="cardBack"></div>
          <div class="card-hint" id="cardHint"></div>
        </div>
      </div>
    </div>

    <div class="transport">
      <button class="transport-btn back" onclick="goBack()" aria-label="Exit">←</button>
      <button class="transport-btn wrong" id="btnWrong" onclick="answer(false)" aria-label="Wrong">✗</button>
      <button class="transport-btn correct" id="btnCorrect" onclick="answer(true)" aria-label="Correct">✓</button>
    </div>
  </main>

  <div class="complete-overlay" id="completeOverlay">
    <div class="complete-icon">🎉</div>
    <div class="complete-title">Great Job!</div>
    <div class="complete-stats">
      <div class="complete-stat">
        <div class="complete-stat-value" id="finalCorrect">0</div>
        <div class="complete-stat-label">Correct</div>
      </div>
      <div class="complete-stat">
        <div class="complete-stat-value" id="finalAccuracy">0%</div>
        <div class="complete-stat-label">Accuracy</div>
      </div>
    </div>
    <button class="complete-btn" onclick="goBack()">Done</button>
  </div>

  <canvas id="confetti"></canvas>

  <script type="module" src="../js/firebase-config.js"></script>
  <script src="../js/storage.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const contentId = params.get('id');
    const studentId = params.get('student') || 'guest';

    let cards = [];
    let currentIndex = 0;
    let correct = 0;
    let total = 0;
    let isFlipped = false;
    let contentData = null;

    async function init() {
      if (window.MokshFirebase) {
        await Moksh.enableCloudSync();
      }

      try {
        const response = await fetch('../data/content.json');
        const data = await response.json();
        contentData = data.content.find(c => c.id === contentId);

        if (!contentData || contentData.format !== 'flashcard') {
          showError('Content not found');
          return;
        }

        const catalogRes = await fetch('../data/catalog.json');
        const catalog = await catalogRes.json();
        const subject = catalog.subjects[contentData.subject];

        document.getElementById('headerTitle').textContent = contentData.name;
        document.getElementById('headerSubtitle').textContent = subject.name;
        document.getElementById('headerIcon').textContent = contentData.icon || subject.icon;
        document.documentElement.style.setProperty('--accent', subject.color);

        cards = [...contentData.items].sort(() => Math.random() - 0.5);
        total = cards.length;

        Moksh.startSession(studentId, contentId);
        showCard();
      } catch (error) {
        console.error('Error loading content:', error);
        showError('Failed to load');
      }
    }

    function showCard() {
      if (currentIndex >= cards.length) {
        showComplete();
        return;
      }

      const card = cards[currentIndex];
      document.getElementById('cardFront').textContent = card.front;
      document.getElementById('cardBack').textContent = card.back;
      document.getElementById('cardHint').textContent = card.highlight ? `Sound: ${card.highlight}` : '';

      isFlipped = false;
      document.getElementById('flashcard').classList.remove('flipped');
      setButtonsActive(false);
      updateProgress();
    }

    function flipCard() {
      if (isFlipped) return;
      isFlipped = true;
      document.getElementById('flashcard').classList.add('flipped');
      setButtonsActive(true);
    }

    function setButtonsActive(active) {
      document.getElementById('btnWrong').classList.toggle('active', active);
      document.getElementById('btnCorrect').classList.toggle('active', active);
    }

    function answer(isCorrect) {
      if (isCorrect) correct++;
      Moksh.recordAnswer(studentId, contentId, isCorrect);
      currentIndex++;

      setButtonsActive(false);
      document.getElementById('flashcard').classList.remove('flipped');
      isFlipped = false;

      setTimeout(() => {
        if (currentIndex >= cards.length) {
          showComplete();
          return;
        }
        const card = cards[currentIndex];
        document.getElementById('cardFront').textContent = card.front;
        document.getElementById('cardBack').textContent = card.back;
        document.getElementById('cardHint').textContent = card.highlight ? `Sound: ${card.highlight}` : '';
        updateProgress();
      }, 350);
    }

    function updateProgress() {
      const progress = (currentIndex / total) * 100;
      const accuracy = currentIndex > 0 ? Math.round((correct / currentIndex) * 100) : 0;

      document.getElementById('progressFill').style.width = `${progress}%`;
      document.getElementById('progressCount').textContent = `${currentIndex + 1} / ${total}`;
      document.getElementById('progressAccuracy').textContent = `${accuracy}% correct`;
    }

    function showComplete() {
      const accuracy = Math.round((correct / total) * 100);
      document.getElementById('finalCorrect').textContent = correct;
      document.getElementById('finalAccuracy').textContent = `${accuracy}%`;
      document.getElementById('completeOverlay').classList.add('visible');
      Moksh.endSession(studentId, contentId);
      launchConfetti();
    }

    function launchConfetti() {
      const canvas = document.getElementById('confetti');
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const pieces = [];
      const colors = ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff', '#5f27cd', '#00d2d3', '#1dd1a1'];

      for (let i = 0; i < 100; i++) {
        pieces.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height - canvas.height,
          r: Math.random() * 5 + 3,
          d: Math.random() * 150,
          color: colors[Math.floor(Math.random() * colors.length)],
          tiltAngle: Math.random() * Math.PI,
          tiltSpeed: Math.random() * 0.1 + 0.05
        });
      }

      let frame = 0;
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        pieces.forEach(p => {
          ctx.fillStyle = p.color;
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(p.tiltAngle);
          ctx.fillRect(-p.r / 2, -p.r / 2, p.r, p.r * 0.6);
          ctx.restore();
          p.y += 2.5 + Math.random() * 1.5;
          p.x += Math.sin(p.d) * 0.4;
          p.tiltAngle += p.tiltSpeed;
          if (p.y > canvas.height) {
            p.y = -10;
            p.x = Math.random() * canvas.width;
          }
        });
        frame++;
        if (frame < 150) {
          requestAnimationFrame(draw);
        } else {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
      }
      draw();
    }

    function showError(message) {
      document.getElementById('cardFront').textContent = message;
    }

    function goBack() {
      if (currentIndex > 0 && currentIndex < total) {
        Moksh.endSession(studentId, contentId);
      }
      if (studentId && studentId !== 'guest') {
        window.location.href = `../dashboard.html?student=${studentId}`;
      } else {
        window.history.back();
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') goBack();
      if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
      if (e.key === 'ArrowLeft' && isFlipped) answer(false);
      if (e.key === 'ArrowRight' && isFlipped) answer(true);
    });

    init();
  </script>
</body>
</html>
