<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Flashcards</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --surface: #16161f;
      --surface2: #1e1e2a;
      --accent: #6366f1;
      --success: #22c55e;
      --error: #ef4444;
      --text: #ffffff;
      --muted: #71717a;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow: hidden;
    }

    /* Navigation Bar */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.5rem;
      background: var(--surface);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .nav-back {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--surface2);
      border: none;
      color: var(--text);
      font-size: 1.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .nav-back:hover {
      background: var(--accent);
      transform: scale(1.05);
    }

    .nav-title {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .nav-title h1 {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .nav-subtitle {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .nav-icon {
      font-size: 2rem;
    }

    /* Progress Bar */
    .progress-container {
      padding: 1rem 1.5rem;
      background: var(--surface);
    }

    .progress-bar {
      height: 8px;
      background: var(--surface2);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--success));
      border-radius: 4px;
      transition: width 0.3s ease;
      width: 0%;
    }

    .progress-text {
      display: flex;
      justify-content: space-between;
      margin-top: 0.5rem;
      font-size: 0.8rem;
      color: var(--muted);
    }

    /* Card Container */
    .card-container {
      display: flex;
      align-items: center;
      justify-content: center;
      height: calc(100vh - 200px);
      padding: 1.5rem;
      perspective: 1000px;
    }

    /* Flashcard */
    .flashcard {
      width: 100%;
      max-width: 400px;
      height: 280px;
      cursor: pointer;
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .flashcard.flipped {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .card-front {
      background: linear-gradient(145deg, var(--surface), var(--surface2));
      border: 2px solid rgba(255,255,255,0.1);
    }

    .card-back {
      background: linear-gradient(145deg, var(--accent), #4f46e5);
      transform: rotateY(180deg);
    }

    .card-content {
      font-size: 2.5rem;
      font-weight: 700;
      line-height: 1.3;
    }

    .card-hint {
      margin-top: 1rem;
      font-size: 0.9rem;
      color: var(--muted);
      opacity: 0.8;
    }

    .card-back .card-hint {
      color: rgba(255,255,255,0.8);
    }

    .tap-hint {
      position: absolute;
      bottom: 1.5rem;
      font-size: 0.75rem;
      color: var(--muted);
      opacity: 0.6;
    }

    /* Answer Buttons */
    .answer-buttons {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      padding: 0 1.5rem 2rem;
    }

    .answer-btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: none;
      font-size: 2rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .answer-btn:active {
      transform: scale(0.9);
    }

    .answer-btn.wrong {
      background: rgba(239, 68, 68, 0.2);
      color: var(--error);
    }

    .answer-btn.wrong:hover {
      background: var(--error);
      color: white;
      box-shadow: 0 8px 30px rgba(239, 68, 68, 0.4);
    }

    .answer-btn.correct {
      background: rgba(34, 197, 94, 0.2);
      color: var(--success);
    }

    .answer-btn.correct:hover {
      background: var(--success);
      color: white;
      box-shadow: 0 8px 30px rgba(34, 197, 94, 0.4);
    }

    /* Celebration Overlay */
    .complete-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .complete-overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .complete-icon {
      font-size: 6rem;
      animation: bounce 0.6s ease;
    }

    @keyframes bounce {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    .complete-title {
      font-size: 2rem;
      font-weight: 700;
      margin: 1rem 0;
    }

    .complete-stats {
      display: flex;
      gap: 2rem;
      margin: 1.5rem 0;
    }

    .complete-stat {
      text-align: center;
    }

    .complete-stat-value {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--success);
    }

    .complete-stat-label {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .complete-btn {
      margin-top: 2rem;
      padding: 1rem 3rem;
      border-radius: 50px;
      background: var(--accent);
      border: none;
      color: white;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .complete-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 30px rgba(99, 102, 241, 0.4);
    }

    /* Confetti Canvas */
    #confetti {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 200;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .card-content { font-size: 2rem; }
      .flashcard { height: 240px; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <button class="nav-back" onclick="goBack()" aria-label="Go back">←</button>
    <div class="nav-title">
      <h1 id="navTitle">Flashcards</h1>
      <span class="nav-subtitle" id="navSubtitle">Loading...</span>
    </div>
    <span class="nav-icon" id="navIcon">⚡</span>
  </nav>

  <div class="progress-container">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-text">
      <span id="progressCount">0 / 0</span>
      <span id="progressAccuracy">0% correct</span>
    </div>
  </div>

  <div class="card-container">
    <div class="flashcard" id="flashcard" onclick="flipCard()">
      <div class="card-face card-front">
        <div class="card-content" id="cardFront">Loading...</div>
        <div class="tap-hint">Tap to flip</div>
      </div>
      <div class="card-face card-back">
        <div class="card-content" id="cardBack"></div>
        <div class="card-hint" id="cardHint"></div>
      </div>
    </div>
  </div>

  <div class="answer-buttons" id="answerButtons" style="visibility: hidden;">
    <button class="answer-btn wrong" onclick="answer(false)" aria-label="Wrong">✗</button>
    <button class="answer-btn correct" onclick="answer(true)" aria-label="Correct">✓</button>
  </div>

  <div class="complete-overlay" id="completeOverlay" onclick="goBack()">
    <div class="complete-icon">🎉</div>
    <div class="complete-title">Great Job!</div>
    <div class="complete-stats">
      <div class="complete-stat">
        <div class="complete-stat-value" id="finalCorrect">0</div>
        <div class="complete-stat-label">Correct</div>
      </div>
      <div class="complete-stat">
        <div class="complete-stat-value" id="finalAccuracy">0%</div>
        <div class="complete-stat-label">Accuracy</div>
      </div>
    </div>
    <button class="complete-btn">Done</button>
  </div>

  <canvas id="confetti"></canvas>

  <script type="module" src="../js/firebase-config.js"></script>
  <script src="../js/storage.js"></script>
  <script>
    // Get URL parameters
    const params = new URLSearchParams(window.location.search);
    const contentId = params.get('id');
    const studentId = params.get('student') || 'guest';

    let cards = [];
    let currentIndex = 0;
    let correct = 0;
    let total = 0;
    let isFlipped = false;
    let contentData = null;

    async function init() {
      // Enable cloud sync
      if (window.MokshFirebase) {
        await Moksh.enableCloudSync();
      }

      // Load content
      try {
        const response = await fetch('../data/content.json');
        const data = await response.json();
        contentData = data.content.find(c => c.id === contentId);

        if (!contentData || contentData.format !== 'flashcard') {
          showError('Content not found');
          return;
        }

        // Load catalog for subject info
        const catalogRes = await fetch('../data/catalog.json');
        const catalog = await catalogRes.json();
        const subject = catalog.subjects[contentData.subject];

        // Update UI
        document.getElementById('navTitle').textContent = contentData.name;
        document.getElementById('navSubtitle').textContent = subject.name;
        document.getElementById('navIcon').textContent = contentData.icon || subject.icon;
        document.documentElement.style.setProperty('--accent', subject.color);

        // Shuffle and prepare cards
        cards = [...contentData.items].sort(() => Math.random() - 0.5);
        total = cards.length;

        // Start session
        Moksh.startSession(studentId, contentId);

        showCard();
      } catch (error) {
        console.error('Error loading content:', error);
        showError('Failed to load');
      }
    }

    function showCard() {
      if (currentIndex >= cards.length) {
        showComplete();
        return;
      }

      const card = cards[currentIndex];
      document.getElementById('cardFront').textContent = card.front;
      document.getElementById('cardBack').textContent = card.back;
      document.getElementById('cardHint').textContent = card.highlight ? `Sound: ${card.highlight}` : '';

      // Reset card state
      isFlipped = false;
      document.getElementById('flashcard').classList.remove('flipped');
      document.getElementById('answerButtons').style.visibility = 'hidden';

      updateProgress();
    }

    function flipCard() {
      if (isFlipped) return;

      isFlipped = true;
      document.getElementById('flashcard').classList.add('flipped');
      document.getElementById('answerButtons').style.visibility = 'visible';
    }

    function answer(isCorrect) {
      if (isCorrect) correct++;

      Moksh.recordAnswer(studentId, contentId, isCorrect);

      currentIndex++;

      // Small delay before next card
      setTimeout(showCard, 300);
    }

    function updateProgress() {
      const progress = ((currentIndex) / total) * 100;
      const accuracy = currentIndex > 0 ? Math.round((correct / currentIndex) * 100) : 0;

      document.getElementById('progressFill').style.width = `${progress}%`;
      document.getElementById('progressCount').textContent = `${currentIndex + 1} / ${total}`;
      document.getElementById('progressAccuracy').textContent = `${accuracy}% correct`;
    }

    function showComplete() {
      const accuracy = Math.round((correct / total) * 100);

      document.getElementById('finalCorrect').textContent = correct;
      document.getElementById('finalAccuracy').textContent = `${accuracy}%`;
      document.getElementById('completeOverlay').classList.add('visible');

      Moksh.endSession(studentId, contentId);
      launchConfetti();
    }

    function launchConfetti() {
      const canvas = document.getElementById('confetti');
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const pieces = [];
      const colors = ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff', '#5f27cd', '#00d2d3', '#1dd1a1'];

      for (let i = 0; i < 150; i++) {
        pieces.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height - canvas.height,
          r: Math.random() * 6 + 4,
          d: Math.random() * 150,
          color: colors[Math.floor(Math.random() * colors.length)],
          tiltAngle: Math.random() * Math.PI,
          tiltSpeed: Math.random() * 0.1 + 0.05
        });
      }

      let frame = 0;
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        pieces.forEach(p => {
          ctx.fillStyle = p.color;
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(p.tiltAngle);
          ctx.fillRect(-p.r / 2, -p.r / 2, p.r, p.r * 0.6);
          ctx.restore();

          p.y += 3 + Math.random() * 2;
          p.x += Math.sin(p.d) * 0.5;
          p.tiltAngle += p.tiltSpeed;

          if (p.y > canvas.height) {
            p.y = -10;
            p.x = Math.random() * canvas.width;
          }
        });

        frame++;
        if (frame < 180) {
          requestAnimationFrame(draw);
        } else {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
      }
      draw();
    }

    function showError(message) {
      document.getElementById('cardFront').textContent = message;
    }

    function goBack() {
      // Save progress if incomplete
      if (currentIndex > 0 && currentIndex < total) {
        Moksh.endSession(studentId, contentId);
      }

      // Navigate back to dashboard
      if (studentId && studentId !== 'guest') {
        window.location.href = `../dashboard.html?student=${studentId}`;
      } else {
        window.history.back();
      }
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') goBack();
      if (e.key === ' ' || e.key === 'Enter') flipCard();
      if (e.key === 'ArrowLeft' && isFlipped) answer(false);
      if (e.key === 'ArrowRight' && isFlipped) answer(true);
    });

    init();
  </script>
</body>
</html>
