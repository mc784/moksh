<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Science Facts</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --surface: #16161f;
      --accent: #22c55e;
      --success: #22c55e;
      --error: #ef4444;
      --text: #ffffff;
      --muted: #71717a;
      --physics: #60a5fa;
      --chemistry: #f59e0b;
      --biology: #34d399;
      --geography: #fb923c;
      --space: #a78bfa;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      touch-action: manipulation;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.5rem;
      background: var(--surface);
    }

    .close-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: none;
      color: var(--text);
      font-size: 1.2rem;
      cursor: pointer;
    }

    .progress-info {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .progress-ring {
      position: relative;
      width: 44px;
      height: 44px;
    }

    .progress-ring svg { transform: rotate(-90deg); }
    .progress-ring circle { fill: none; stroke-width: 4; }
    .progress-ring .bg { stroke: rgba(255,255,255,0.1); }
    .progress-ring .fg {
      stroke: var(--accent);
      stroke-linecap: round;
      transition: stroke-dashoffset 0.3s;
    }

    .progress-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 0.75rem;
      font-weight: 600;
    }

    .score {
      display: flex;
      gap: 1rem;
      font-size: 1rem;
    }

    .score .correct { color: var(--success); }
    .score .wrong { color: var(--error); }

    .card-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .category-badge {
      padding: 0.4rem 1rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 1rem;
    }

    .card {
      width: 100%;
      max-width: 380px;
      min-height: 280px;
      background: linear-gradient(145deg, var(--surface), #1a1a2a);
      border-radius: 24px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      cursor: pointer;
      transition: transform 0.3s;
      user-select: none;
      position: relative;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--cat-color, var(--accent));
      border-radius: 24px 24px 0 0;
    }

    .card.correct { animation: flashCorrect 0.4s; }
    .card.wrong { animation: flashWrong 0.4s; }

    @keyframes flashCorrect {
      50% { background: linear-gradient(145deg, #166534, #14532d); }
    }

    @keyframes flashWrong {
      50% { background: linear-gradient(145deg, #991b1b, #7f1d1d); }
    }

    .question {
      font-size: 1.4rem;
      font-weight: 600;
      line-height: 1.4;
    }

    .answer {
      font-size: 1.1rem;
      line-height: 1.5;
      color: var(--cat-color, #86efac);
      margin-top: 1.5rem;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .answer.visible { opacity: 1; }

    .hint {
      position: absolute;
      bottom: 1rem;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .actions {
      display: flex;
      gap: 1rem;
      padding: 1.5rem;
      justify-content: center;
    }

    .action-btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: none;
      font-size: 1.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .action-btn:active { transform: scale(0.95); }
    .btn-wrong { background: var(--error); color: white; }
    .btn-correct { background: var(--success); color: white; }

    .results {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .results.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .results h2 { font-size: 2rem; margin-bottom: 0.5rem; }

    .results .big-score {
      font-size: 5rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--success), #86efac);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 1rem 0;
    }

    .results .detail { color: var(--muted); margin-bottom: 2rem; }

    .results .btn-row { display: flex; gap: 1rem; }

    .results button {
      padding: 1rem 2rem;
      border-radius: 12px;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }

    .results .btn-primary { background: var(--accent); color: white; }
    .results .btn-secondary { background: var(--surface); color: var(--text); }

    .missed-list {
      margin-top: 1.5rem;
      padding: 1rem;
      background: var(--surface);
      border-radius: 12px;
      max-width: 340px;
      max-height: 180px;
      overflow-y: auto;
      text-align: left;
    }

    .missed-list h4 { color: var(--error); font-size: 0.8rem; margin-bottom: 0.5rem; }
    .missed-item { margin: 0.8rem 0; padding-bottom: 0.8rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .missed-item strong { font-size: 0.85rem; color: var(--text); display: block; margin-bottom: 0.3rem; }
    .missed-item span { font-size: 0.8rem; color: var(--accent); }
  </style>
</head>
<body>
  <header class="header">
    <button class="close-btn" onclick="exitDrill()">×</button>
    <div class="progress-info">
      <div class="progress-ring">
        <svg width="44" height="44">
          <circle class="bg" cx="22" cy="22" r="18"/>
          <circle class="fg" id="progressCircle" cx="22" cy="22" r="18"
            stroke-dasharray="113" stroke-dashoffset="113"/>
        </svg>
        <span class="progress-text" id="progressText">0/15</span>
      </div>
      <div class="score">
        <span class="correct" id="correctCount">✓ 0</span>
        <span class="wrong" id="wrongCount">✗ 0</span>
      </div>
    </div>
  </header>

  <div class="card-area" onclick="revealAnswer()">
    <div class="category-badge" id="categoryBadge">Physics</div>
    <div class="card" id="card">
      <div class="question" id="question">Loading...</div>
      <div class="answer" id="answer"></div>
      <div class="hint">Tap to reveal</div>
    </div>
  </div>

  <div class="actions">
    <button class="action-btn btn-wrong" onclick="event.stopPropagation(); markWrong()">✗</button>
    <button class="action-btn btn-correct" onclick="event.stopPropagation(); markCorrect()">✓</button>
  </div>

  <div class="results" id="results">
    <h2>Session Complete!</h2>
    <div class="big-score" id="finalScore">85%</div>
    <p class="detail" id="finalDetail">13/15 correct</p>
    <div id="missedContainer"></div>
    <div class="btn-row">
      <button class="btn-secondary" onclick="exitDrill()">Done</button>
      <button class="btn-primary" onclick="startDrill()">Again</button>
    </div>
  </div>

  <canvas id="confetti" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:400;"></canvas>

  <script src="../js/storage.js"></script>
  <script>
    const catColors = {
      physics: '#60a5fa',
      chemistry: '#f59e0b',
      biology: '#34d399',
      geography: '#fb923c',
      space: '#a78bfa'
    };

    const facts = {
      physics: [
        ["What are the 3 states of matter?", "Solid, Liquid, Gas"],
        ["What is the speed of light?", "300,000 km/s"],
        ["What is gravity?", "A force pulling objects toward each other"],
        ["What is friction?", "A force that slows objects when surfaces rub"],
        ["What are conductors vs insulators?", "Conductors carry electricity; Insulators block it"],
        ["What is the boiling point of water?", "100°C at sea level"],
        ["What is the freezing point of water?", "0°C"],
        ["What is energy?", "The ability to do work"],
        ["What are the 7 colors of light?", "Red, Orange, Yellow, Green, Blue, Indigo, Violet"],
        ["Why do things float?", "They are less dense than the liquid"],
      ],
      chemistry: [
        ["What is an atom?", "The smallest unit of an element"],
        ["What are the 3 parts of an atom?", "Protons, Neutrons, Electrons"],
        ["What is the formula for water?", "H₂O"],
        ["What gas do we breathe in?", "Oxygen (O₂)"],
        ["What gas do we breathe out?", "Carbon dioxide (CO₂)"],
        ["What is the most common gas in air?", "Nitrogen (78%)"],
        ["What is the pH scale?", "Measures acidity: 0-6 acid, 7 neutral, 8-14 base"],
        ["What is rust?", "Iron oxide - iron + oxygen + water"],
        ["What is the formula for table salt?", "NaCl (sodium chloride)"],
        ["What happens when acid meets base?", "Neutralization - makes water + salt"],
      ],
      biology: [
        ["What is the basic unit of life?", "The cell"],
        ["What do plants need for photosynthesis?", "Sunlight, water, carbon dioxide"],
        ["What do plants produce?", "Glucose and oxygen"],
        ["What is DNA?", "Molecule carrying genetic instructions"],
        ["What is the largest organ?", "The skin"],
        ["How many bones in an adult human?", "206"],
        ["What does the heart do?", "Pumps blood through arteries and veins"],
        ["What do lungs do?", "Take in oxygen, release carbon dioxide"],
        ["What is a food chain?", "Energy flow: producer → consumer → predator"],
        ["What is evolution?", "Species changing over generations"],
      ],
      geography: [
        ["What are the 7 continents?", "Asia, Africa, N/S America, Antarctica, Europe, Australia"],
        ["What are the 5 oceans?", "Pacific, Atlantic, Indian, Southern, Arctic"],
        ["What causes day and night?", "Earth rotating on its axis"],
        ["What causes seasons?", "Earth's 23.5° axial tilt"],
        ["What is the water cycle?", "Evaporation → Condensation → Precipitation"],
        ["What are tectonic plates?", "Giant slabs of rock making up Earth's crust"],
        ["What is the driest place on Earth?", "Atacama Desert, Chile"],
        ["What % of Earth is water?", "About 71%"],
        ["What is the largest desert?", "Antarctica (cold desert)"],
        ["What are the 3 types of rock?", "Igneous, Sedimentary, Metamorphic"],
      ],
      space: [
        ["What are the 8 planets?", "Mercury, Venus, Earth, Mars, Jupiter, Saturn, Uranus, Neptune"],
        ["What is the largest planet?", "Jupiter"],
        ["What is the closest star?", "The Sun"],
        ["How old is Earth?", "About 4.5 billion years"],
        ["What is the Milky Way?", "Our galaxy - billions of stars"],
        ["What causes Moon phases?", "We see different amounts of sunlit half"],
        ["What is a light-year?", "Distance light travels in one year"],
        ["Which planet has rings?", "Saturn (most visible)"],
        ["What is a black hole?", "Region where gravity is so strong nothing escapes"],
        ["Who first walked on the Moon?", "Neil Armstrong (1969)"],
      ]
    };

    const userId = 'shivaya';
    const activityId = 'science';
    let deck = [], current = 0, correct = 0, wrong = 0, missed = [];
    let revealed = false;

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function startDrill() {
      // Mix from all categories - 15 facts
      deck = [];
      Object.entries(facts).forEach(([cat, items]) => {
        shuffle(items).slice(0, 3).forEach(([q, a]) => {
          deck.push({ q, a, cat });
        });
      });
      deck = shuffle(deck);

      current = 0;
      correct = 0;
      wrong = 0;
      missed = [];
      revealed = false;

      document.getElementById('results').classList.remove('visible');
      Moksh.startSession(userId, activityId);
      showCard();
    }

    function showCard() {
      if (current >= deck.length) {
        endDrill();
        return;
      }

      revealed = false;
      const { q, a, cat } = deck[current];
      const color = catColors[cat];

      document.getElementById('question').textContent = q;
      document.getElementById('answer').textContent = a;
      document.getElementById('answer').classList.remove('visible');
      document.getElementById('card').classList.remove('correct', 'wrong');
      document.getElementById('card').style.setProperty('--cat-color', color);

      const badge = document.getElementById('categoryBadge');
      badge.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
      badge.style.background = `${color}20`;
      badge.style.color = color;

      updateProgress();
    }

    function revealAnswer() {
      if (!revealed) {
        revealed = true;
        document.getElementById('answer').classList.add('visible');
      }
    }

    function markCorrect() {
      if (current >= deck.length) return;
      revealAnswer();

      correct++;
      document.getElementById('card').classList.add('correct');
      document.getElementById('correctCount').textContent = `✓ ${correct}`;
      Moksh.recordAnswer(userId, activityId, true);

      setTimeout(() => { current++; showCard(); }, 300);
    }

    function markWrong() {
      if (current >= deck.length) return;
      revealAnswer();

      wrong++;
      missed.push(deck[current]);
      document.getElementById('card').classList.add('wrong');
      document.getElementById('wrongCount').textContent = `✗ ${wrong}`;
      Moksh.recordAnswer(userId, activityId, false);

      setTimeout(() => { current++; showCard(); }, 500);
    }

    function updateProgress() {
      const pct = deck.length > 0 ? current / deck.length : 0;
      document.getElementById('progressCircle').style.strokeDashoffset = 113 - (113 * pct);
      document.getElementById('progressText').textContent = `${current}/${deck.length}`;
    }

    function endDrill() {
      Moksh.endSession(userId, activityId);
      const pct = deck.length > 0 ? Math.round((correct / deck.length) * 100) : 0;

      document.getElementById('finalScore').textContent = `${pct}%`;
      document.getElementById('finalDetail').textContent = `${correct}/${deck.length} correct`;

      const container = document.getElementById('missedContainer');
      if (missed.length > 0) {
        container.innerHTML = `
          <div class="missed-list">
            <h4>Review these:</h4>
            ${missed.map(m => `<div class="missed-item"><strong>${m.q}</strong><span>${m.a}</span></div>`).join('')}
          </div>
        `;
      } else {
        container.innerHTML = '<p style="color: var(--success); margin: 1rem 0;">Perfect! 🎉</p>';
      }

      document.getElementById('results').classList.add('visible');
      launchConfetti();
    }

    function launchConfetti() {
      const canvas = document.getElementById('confetti');
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const pieces = [];
      const colors = ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff', '#5f27cd', '#00d2d3', '#1dd1a1'];

      for (let i = 0; i < 150; i++) {
        pieces.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height - canvas.height,
          r: Math.random() * 6 + 4,
          color: colors[Math.floor(Math.random() * colors.length)],
          tilt: Math.random() * 10 - 5,
          tiltAngle: Math.random() * Math.PI,
          tiltSpeed: Math.random() * 0.1 + 0.05
        });
      }

      let frame = 0;
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        pieces.forEach(p => {
          ctx.beginPath();
          ctx.fillStyle = p.color;
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(p.tiltAngle);
          ctx.fillRect(-p.r / 2, -p.r / 2, p.r, p.r * 0.6);
          ctx.restore();

          p.y += 3 + Math.random() * 2;
          p.x += Math.sin(p.tilt) * 0.5;
          p.tiltAngle += p.tiltSpeed;

          if (p.y > canvas.height) {
            p.y = -10;
            p.x = Math.random() * canvas.width;
          }
        });

        frame++;
        if (frame < 180) {
          requestAnimationFrame(draw);
        } else {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
      }
      draw();
    }

    function exitDrill() {
      window.history.back();
    }

    document.addEventListener('keydown', e => {
      if (e.key === ' ' || e.key === 'Enter') { revealAnswer(); e.preventDefault(); }
      if (e.key === 'ArrowRight' || e.key === 'y') markCorrect();
      if (e.key === 'ArrowLeft' || e.key === 'n') markWrong();
      if (e.key === 'Escape') exitDrill();
    });

    startDrill();
  </script>
</body>
</html>
