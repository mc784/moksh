<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Science Flashcards — 200 Lifelong Facts</title>
<style>
:root {
  --bg: #0f0e17; --surface: #1a1932; --card: #232246;
  --accent: #00e8a2; --accent2: #7f5af0; --warn: #ff6b6b;
  --text: #fffffe; --muted: #94a1b2;
  --physics: #60a5fa; --chemistry: #f59e0b; --biology: #34d399;
  --geography: #fb923c; --space: #a78bfa;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px; }

h1 { font-size: 2em; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 4px; }
.subtitle { color: var(--muted); margin-bottom: 24px; font-size: 0.9em; }

/* Category selector */
.categories { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; justify-content: center; max-width: 600px; }
.cat-btn { display: flex; align-items: center; gap: 8px; background: var(--surface); padding: 12px 18px; border-radius: 12px; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; font-size: 0.9em; }
.cat-btn:hover { border-color: var(--accent); transform: translateY(-2px); }
.cat-btn input { width: 16px; height: 16px; accent-color: var(--accent); }
.cat-btn input:checked ~ span { font-weight: 600; }
.cat-btn[data-cat="physics"] input:checked ~ span { color: var(--physics); }
.cat-btn[data-cat="chemistry"] input:checked ~ span { color: var(--chemistry); }
.cat-btn[data-cat="biology"] input:checked ~ span { color: var(--biology); }
.cat-btn[data-cat="geography"] input:checked ~ span { color: var(--geography); }
.cat-btn[data-cat="space"] input:checked ~ span { color: var(--space); }

.options { margin-bottom: 20px; color: var(--muted); font-size: 0.85em; }
.options label { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; }
.options input { accent-color: var(--accent); }

button { background: var(--accent2); color: #fff; border: none; padding: 14px 32px; border-radius: 12px; cursor: pointer; font-size: 1em; font-weight: 600; transition: all 0.2s; }
button:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(127,90,240,0.3); }
button.success { background: #059669; }
button.danger { background: var(--warn); }
button.ghost { background: transparent; border: 1px solid var(--muted); color: var(--muted); padding: 10px 20px; font-size: 0.85em; }
button.ghost:hover { border-color: var(--text); color: var(--text); box-shadow: none; }

/* Drill view */
.drill-bar { display: flex; align-items: center; width: 100%; max-width: 380px; justify-content: space-between; margin-bottom: 8px; }
.drill-bar .timer { color: var(--accent); font-weight: 600; font-size: 1.1em; }
.drill-bar .cat-tag { font-size: 0.75em; padding: 4px 10px; border-radius: 20px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

.progress-wrap { width: 100%; max-width: 380px; margin-bottom: 6px; }
.progress-bar { width: 100%; height: 6px; background: var(--surface); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.3s; border-radius: 3px; }
.stats { display: flex; gap: 16px; font-size: 0.85em; color: var(--muted); margin-bottom: 12px; }
.stats .correct { color: #34d399; }
.stats .wrong { color: var(--warn); }

/* Card */
.card-container { perspective: 1200px; margin: 16px 0; }
.card { width: 360px; height: 240px; position: relative; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
.card.flipped { transform: rotateY(180deg); }
.card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 28px; text-align: center; }
.card-front { background: linear-gradient(145deg, var(--card), var(--surface)); border: 1px solid rgba(255,255,255,0.06); box-shadow: 0 20px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05); }
.card-front .q-text { font-size: 1.2em; font-weight: 600; line-height: 1.4; }
.card-front .card-num { position: absolute; bottom: 14px; right: 18px; font-size: 0.7em; color: var(--muted); }
.card-back { background: linear-gradient(145deg, #1b3a2a, #162e23); border: 1px solid rgba(52,211,153,0.2); box-shadow: 0 20px 60px rgba(0,0,0,0.4); transform: rotateY(180deg); }
.card-back .a-text { font-size: 1.1em; line-height: 1.5; color: #d1fae5; }

.actions { display: flex; gap: 12px; margin-top: 16px; }
.actions button { padding: 14px 28px; border-radius: 12px; font-size: 1em; }

/* Results */
.results { text-align: center; max-width: 420px; }
.results h2 { font-size: 1.6em; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 12px; }
.results .score { font-size: 3.5em; font-weight: 700; margin: 8px 0; }
.results .time-text { color: var(--muted); margin-bottom: 16px; }
.missed-box { text-align: left; margin: 16px 0; padding: 16px; background: var(--surface); border-radius: 12px; max-height: 280px; overflow-y: auto; }
.missed-box h3 { color: var(--warn); font-size: 0.85em; margin-bottom: 10px; }
.missed-box .item { margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.85em; }
.missed-box .item strong { color: var(--text); }
.missed-box .item .ans { color: var(--accent); margin-top: 3px; }

.hidden { display: none; }

@media (max-width: 400px) {
  .card { width: 92vw; height: 220px; }
  .drill-bar, .progress-wrap { width: 92vw; }
}
</style>
</head>
<body>

<h1>🔬 Science Flashcards</h1>
<p class="subtitle">200 lifelong facts · tap to flip · swipe through knowledge</p>

<div id="setup">
  <div class="categories">
    <label class="cat-btn" data-cat="physics"><input type="checkbox" value="physics" checked><span>⚡ Physics (40)</span></label>
    <label class="cat-btn" data-cat="chemistry"><input type="checkbox" value="chemistry" checked><span>🧪 Chemistry (40)</span></label>
    <label class="cat-btn" data-cat="biology"><input type="checkbox" value="biology" checked><span>🌿 Biology (40)</span></label>
    <label class="cat-btn" data-cat="geography"><input type="checkbox" value="geography" checked><span>🌍 Geography (40)</span></label>
    <label class="cat-btn" data-cat="space"><input type="checkbox" value="space" checked><span>🚀 Space (40)</span></label>
  </div>
  <div class="options">
    <label><input type="checkbox" id="audioMode" checked> 🔊 Read aloud</label>
  </div>
  <button onclick="startDrill()">Start Drill</button>
</div>

<div id="drill" class="hidden">
  <div class="drill-bar">
    <button class="ghost" onclick="exitDrill()">✕ Exit</button>
    <span class="cat-tag" id="catTag"></span>
    <span class="timer" id="timer">0:00</span>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>
  <div class="stats">
    <span class="correct">✓ <span id="correctCount">0</span></span>
    <span class="wrong">✗ <span id="wrongCount">0</span></span>
    <span><span id="remainingCount">0</span> left</span>
  </div>

  <div class="card-container">
    <div class="card" id="card" onclick="flipCard()">
      <div class="card-face card-front">
        <div class="q-text" id="question"></div>
        <div class="card-num" id="hint"></div>
      </div>
      <div class="card-face card-back">
        <div class="a-text" id="answer"></div>
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="success" onclick="markCorrect()">✓ Knew it</button>
    <button class="danger" onclick="markWrong()">✗ Learn</button>
  </div>
</div>

<div id="results" class="hidden results">
  <h2>Session Complete!</h2>
  <div class="score" id="finalScore"></div>
  <p class="time-text" id="finalTime"></p>
  <div class="missed-box hidden" id="missedList">
    <h3>📖 Review these:</h3>
    <div id="missedFacts"></div>
  </div>
  <div class="actions" style="justify-content:center; margin-top:20px;">
    <button onclick="retryMissed()">Retry Missed</button>
    <button class="ghost" onclick="resetAll()">New Drill</button>
  </div>
</div>

["What is a solar eclipse?","Moon passes between Sun and Earth, blocking sunlight"],
["What is a lunar eclipse?","Earth passes between Sun and Moon, casting shadow on Moon"],
["What is the Kuiper Belt?","A ring of icy objects beyond Neptune — home of Pluto and many comets"]
]
};

const catColors = { physics:'var(--physics)', chemistry:'var(--chemistry)', biology:'var(--biology)', geography:'var(--geography)', space:'var(--space)' };
let deck = [], current = 0, correct = 0, wrong = 0, missed = [];
let timerInterval, startTime;

function speak(text) {
  if (!document.getElementById('audioMode').checked) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.85; u.pitch = 1.0;
  window.speechSynthesis.speak(u);
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startDrill() {
  deck = [];
  document.querySelectorAll('.categories input:checked').forEach(c => {
    facts[c.value].forEach(([q, a]) => deck.push({ q, a, cat: c.value }));
  });
  if (!deck.length) { alert('Select at least one category!'); return; }
  shuffle(deck);
  current = 0; correct = 0; wrong = 0; missed = [];
  document.getElementById('setup').classList.add('hidden');
  document.getElementById('drill').classList.remove('hidden');
  document.getElementById('results').classList.add('hidden');
  document.getElementById('correctCount').textContent = 0;
  document.getElementById('wrongCount').textContent = 0;
  startTime = Date.now();
  timerInterval = setInterval(updateTimer, 1000);
  showCard();
}

function exitDrill() {
  clearInterval(timerInterval);
  window.speechSynthesis.cancel();
  document.getElementById('drill').classList.add('hidden');
  document.getElementById('setup').classList.remove('hidden');
}

function updateTimer() {
  const s = Math.floor((Date.now() - startTime) / 1000);
  document.getElementById('timer').textContent = `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}

function showCard() {
  if (current >= deck.length) { endDrill(); return; }
  const card = document.getElementById('card');
  card.style.visibility = 'hidden';
  card.style.transition = 'none';
  card.classList.remove('flipped');
  const { q, a, cat } = deck[current];
  document.getElementById('question').textContent = q;
  document.getElementById('answer').textContent = a;
  document.getElementById('hint').textContent = `${current+1} / ${deck.length}`;
  const tag = document.getElementById('catTag');
  tag.textContent = cat;
  tag.style.background = catColors[cat];
  tag.style.color = '#000';
  document.getElementById('remainingCount').textContent = deck.length - current;
  document.getElementById('progressFill').style.width = `${(current/deck.length)*100}%`;
  void card.offsetHeight;
  card.style.transition = '';
  card.style.visibility = '';
  speak(q);
}

function flipCard() {
  const card = document.getElementById('card');
  card.classList.toggle('flipped');
  if (card.classList.contains('flipped')) speak(deck[current].a);
}

function markCorrect() { correct++; document.getElementById('correctCount').textContent = correct; current++; showCard(); }
function markWrong() { wrong++; missed.push(deck[current]); document.getElementById('wrongCount').textContent = wrong; current++; showCard(); }

function endDrill() {
  clearInterval(timerInterval);
  document.getElementById('drill').classList.add('hidden');
  document.getElementById('results').classList.remove('hidden');
  const pct = deck.length ? Math.round((correct/deck.length)*100) : 0;
  document.getElementById('finalScore').textContent = `${pct}%`;
  const s = Math.floor((Date.now() - startTime) / 1000);
  document.getElementById('finalTime').textContent = `${correct}/${deck.length} correct in ${Math.floor(s/60)}m ${s%60}s`;
  if (missed.length) {
    document.getElementById('missedList').classList.remove('hidden');
    document.getElementById('missedFacts').innerHTML = missed.map(m => `<div class="item"><strong>${m.q}</strong><div class="ans">${m.a}</div></div>`).join('');
  } else { document.getElementById('missedList').classList.add('hidden'); }
}

function retryMissed() {
  if (!missed.length) { resetAll(); return; }
  deck = shuffle([...missed]); current = 0; correct = 0; wrong = 0; missed = [];
  document.getElementById('results').classList.add('hidden');
  document.getElementById('drill').classList.remove('hidden');
  document.getElementById('correctCount').textContent = 0;
  document.getElementById('wrongCount').textContent = 0;
  startTime = Date.now(); timerInterval = setInterval(updateTimer, 1000);
  showCard();
}

function resetAll() {
  document.getElementById('results').classList.add('hidden');
  document.getElementById('drill').classList.add('hidden');
  document.getElementById('setup').classList.remove('hidden');
}

document.addEventListener('keydown', e => {
  if (document.getElementById('drill').classList.contains('hidden')) return;
  if (e.key === 'Escape') { exitDrill(); return; }
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
  if (e.key === 'ArrowRight' || e.key === 'y') markCorrect();
  if (e.key === 'ArrowLeft' || e.key === 'n') markWrong();
});
</script>
</body>
</html>
