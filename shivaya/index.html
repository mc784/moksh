<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shivaya's Space</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --surface: #16161f;
      --surface2: #1e1e2a;
      --accent: #ec4899;
      --accent-glow: rgba(236, 72, 153, 0.2);
      --text: #ffffff;
      --muted: #71717a;
      --success: #22c55e;
      --warning: #f59e0b;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 2rem;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 2rem;
      background: linear-gradient(180deg, var(--surface) 0%, transparent 100%);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .back-btn {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: var(--surface2);
      border: none;
      color: var(--text);
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .back-btn:hover {
      background: var(--accent);
      transform: scale(1.05);
    }

    .profile-mini {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .profile-mini img {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--accent);
    }

    .profile-info h2 {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .streak-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.8rem;
      color: #fb923c;
    }

    /* Mini stats bar */
    .stats-mini {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 0.8rem 1.5rem;
      margin: 1rem 2rem 2rem;
      background: var(--surface);
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .mini-stat {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .mini-stat span {
      color: var(--text);
      font-weight: 600;
    }

    .mini-stat-arrow {
      color: var(--accent);
      font-weight: 600;
    }

    /* Section */
    .section {
      padding: 0 2rem;
      margin-bottom: 2rem;
    }

    .section-title {
      font-size: 0.85rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 1rem;
    }

    /* Activity Grid */
    .activity-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1rem;
    }

    .activity-card {
      position: relative;
      background: var(--surface);
      border-radius: 20px;
      padding: 1.5rem;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid rgba(255,255,255,0.05);
      text-decoration: none;
      color: var(--text);
      overflow: hidden;
    }

    .activity-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--card-color, var(--accent));
      opacity: 0.5;
      transition: opacity 0.3s;
    }

    .activity-card:hover {
      transform: translateY(-4px);
      border-color: var(--card-color, var(--accent));
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }

    .activity-card:hover::before {
      opacity: 1;
    }

    .activity-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    .activity-name {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.3rem;
    }

    .activity-status {
      display: inline-block;
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      margin-top: 0.5rem;
    }

    .activity-status.new {
      background: rgba(99, 102, 241, 0.2);
      color: #818cf8;
    }

    .activity-status.completed {
      background: rgba(34, 197, 94, 0.2);
      color: #4ade80;
    }

    .activity-status.continue {
      background: rgba(251, 146, 60, 0.2);
      color: #fb923c;
    }

    .activity-status.retake {
      background: rgba(239, 68, 68, 0.2);
      color: #f87171;
    }

    @media (max-width: 600px) {
      .header { padding: 1rem; }
      .section { padding: 0 1rem; }
      .stats-row { padding: 0 1rem; }
      .activity-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <header class="header">
    <button class="back-btn" onclick="window.location.href='../'">←</button>
    <div class="profile-mini">
      <div class="profile-info">
        <h2>Shivaya</h2>
        <span class="streak-badge" id="streakBadge">🔥 0 days</span>
      </div>
      <img src="../avatars/shivaya.jpg" alt="Shivaya">
    </div>
  </header>

  <div class="section">
    <h3 class="section-title">Your Assignments</h3>
    <div class="activity-grid" id="assignmentsGrid">
      <!-- Assignments loaded dynamically -->
    </div>
  </div>

  <a href="stats.html" class="stats-mini" id="statsRow" style="text-decoration: none; color: inherit;">
    <span class="mini-stat">📊 <span id="statSessions">0</span> sessions</span>
    <span class="mini-stat">⏱️ <span id="statTime">0m</span></span>
    <span class="mini-stat">🎯 <span id="statAccuracy">-</span></span>
    <span class="mini-stat-arrow">→</span>
  </a>

  <script type="module" src="../js/firebase-config.js"></script>
  <script src="../js/storage.js"></script>
  <script>
    const userId = 'shivaya';

    // Enable cloud sync for assignments
    setTimeout(async () => {
      if (window.MokshFirebase) {
        await Moksh.enableCloudSync();
        renderAssignments(); // Re-render with cloud data
      }
    }, 1000);

    // All activities
    const allActivities = [
      // Flashcards
      { id: 'times-tables', name: 'Times Tables', icon: '⚡', color: '#6366f1', href: '../drills/times-tables.html' },
      { id: 'science', name: 'Science Facts', icon: '🔬', color: '#22c55e', href: '../drills/science.html' },
      { id: 'cards-shchth', name: 'sh · ch · th', icon: '🔤', color: '#f59e0b', href: 'stories.html?story=cards_shchth' },
      { id: 'cards-stspsn', name: 'st · sp · sn', icon: '🔤', color: '#f59e0b', href: 'stories.html?story=cards_stspsn' },
      { id: 'cards-trdrbrg', name: 'tr · dr · br · gr', icon: '🔤', color: '#f59e0b', href: 'stories.html?story=cards_trdrbrg' },
      { id: 'cards-clblflpl', name: 'cl · bl · fl · pl', icon: '🔤', color: '#f59e0b', href: 'stories.html?story=cards_clblflpl' },
      { id: 'cards-ngnkmpnd', name: 'ng · nk · mp · nd', icon: '🔤', color: '#f59e0b', href: 'stories.html?story=cards_ngnkmpnd' },
      // Stories
      { id: 'story-shchth', name: 'The Shop for Chips!', icon: '📖', color: '#ec4899', href: 'stories.html?story=shchth' },
      { id: 'story-stspsn', name: 'Stop, Spin, Snap!', icon: '📖', color: '#ec4899', href: 'stories.html?story=stspsn' },
      { id: 'story-trdrbrg', name: 'A Trip to the Park!', icon: '📖', color: '#ec4899', href: 'stories.html?story=trdrbrg' },
      { id: 'story-clblflpl', name: 'Clap, Blow, Flip, Plop!', icon: '📖', color: '#ec4899', href: 'stories.html?story=clblflpl' },
      { id: 'story-ngnkmpnd', name: 'Ring, Sink, Jump, Sand!', icon: '📖', color: '#ec4899', href: 'stories.html?story=ngnkmpnd' },
      { id: 'story-bua', name: 'Bua Ji', icon: '🧡', color: '#f97316', href: 'stories.html?story=bua' },
      { id: 'story-noni', name: 'Noni Mata', icon: '💜', color: '#a855f7', href: 'stories.html?story=noni' },
      { id: 'story-taya', name: 'Taya Ji', icon: '💚', color: '#22c55e', href: 'stories.html?story=taya' },
      { id: 'story-dada', name: 'Dada Dadi', icon: '❤️', color: '#ef4444', href: 'stories.html?story=dada' },
      { id: 'story-papa', name: 'Papa', icon: '💙', color: '#3b82f6', href: 'stories.html?story=papa' },
      // Hindi Stories
      { id: 'hindi-ganesh', name: 'गणेश जी जीते', icon: '🐘', color: '#ff9933', href: 'stories.html?story=ganesh' },
      { id: 'hindi-krishna', name: 'कृष्ण जी और माखन', icon: '🧈', color: '#ff9933', href: 'stories.html?story=krishna' },
      { id: 'hindi-durga', name: 'दुर्गा माँ और महिषासुर', icon: '🦁', color: '#ff9933', href: 'stories.html?story=durga' },
    ];

    function init() {
      renderStats();
      renderAssignments();
    }

    function renderStats() {
      const stats = Moksh.getOverallStats(userId);
      if (stats) {
        document.getElementById('statSessions').textContent = stats.totalSessions;
        document.getElementById('statTime').textContent = stats.totalTimeFormatted || '0m';
        document.getElementById('statAccuracy').textContent = stats.overallAccuracy > 0 ? `${stats.overallAccuracy}%` : '-';
        document.getElementById('streakBadge').textContent = stats.currentStreak > 0
          ? `🔥 ${stats.currentStreak} day${stats.currentStreak > 1 ? 's' : ''}`
          : '💤 Start streak!';
      }
    }

    function renderAssignments() {
      const grid = document.getElementById('assignmentsGrid');
      const assigned = allActivities.filter(a => Moksh.isAssigned(userId, a.id));

      if (assigned.length === 0) {
        grid.innerHTML = '<p style="color: var(--muted); grid-column: 1/-1; text-align: center; padding: 2rem;">No assignments yet!</p>';
        return;
      }

      grid.innerHTML = assigned.map(a => {
        const stats = Moksh.getActivityStats(userId, a.id);
        const attempts = stats?.attempts || 0;
        const accuracy = stats?.totalQuestions > 0
          ? Math.round((stats.totalCorrect / stats.totalQuestions) * 100) : 0;

        // Determine status
        let status, statusClass;
        if (attempts === 0) {
          status = 'Start';
          statusClass = 'new';
        } else if (accuracy >= 80) {
          status = 'Completed';
          statusClass = 'completed';
        } else if (accuracy >= 50) {
          status = 'Continue';
          statusClass = 'continue';
        } else {
          status = 'Retake';
          statusClass = 'retake';
        }

        return `
          <a href="${a.href}" class="activity-card" style="--card-color: ${a.color}">
            <div class="activity-icon">${a.icon}</div>
            <div class="activity-name">${a.name}</div>
            <div class="activity-status ${statusClass}">${status}</div>
          </a>
        `;
      }).join('');
    }

    init();
  </script>
</body>
</html>
